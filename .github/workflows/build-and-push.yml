# Build and Push Docker Image Workflow
# Maintainer: Mario Enrico Ragucci (ghmer) <openldap@r5i.xyz>
# Repository: https://github.com/ghmer/openldap-container
# License: MIT

name: Build and Push Docker Image

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
    paths:
      - 'entrypoint.sh'
      - 'Dockerfile'
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  IMAGE_NAME: garthako/openldap
  IMAGE_TAG: v2.6
  GHCR_IMAGE: ghcr.io/ghmer/openldap

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: prep
        env:
          GITHUB_IMAGE_TAG: ${{ vars.IMAGE_TAG }}
        run: |
          # Use GitHub environment variable if set, otherwise use workflow default
          if [ -n "$GITHUB_IMAGE_TAG" ]; then
            VERSION="$GITHUB_IMAGE_TAG"
          else
            VERSION="${IMAGE_TAG}"
          fi
          
          # Build tags array
          TAGS=("${GHCR_IMAGE}:${VERSION}" "${GHCR_IMAGE}:latest")
          
          # If this is a tag push, add the Git tag as an additional Docker tag
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            GIT_TAG="${GITHUB_REF#refs/tags/}"
            TAGS+=("${GHCR_IMAGE}:${GIT_TAG}")
            echo "Building with tags: ${VERSION}, ${GIT_TAG}, latest"
          else
            echo "Building with tags: ${VERSION}, latest"
          fi
          
          # Output tags as newline-separated string using heredoc
          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (multi-platform)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max